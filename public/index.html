<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Pro - Resultados en Vivo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <!-- Ocultar barra superior de Google Translate -->
    <style>
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        /* Ocultar scrollbar para el menú horizontal */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <!-- Script de Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'es', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>

<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-white min-h-screen transition-colors duration-300">

    <!-- Header Principal -->
    <header class="p-4 border-b border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 flex justify-between items-center sticky top-0 z-40 shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-2xl">⚽</span>
            <h1 class="text-xl font-bold tracking-tight">Fútbol Pro</h1>
        </div>
        
        <button id="btnAjustes" class="p-2 bg-slate-200 dark:bg-slate-700 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600 transition shadow">
            ⚙️
        </button>
    </header>

    <!-- Menú de Ajustes Flotante -->
    <div id="menuAjustes" class="hidden absolute right-4 top-16 bg-white dark:bg-slate-800 p-5 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-600 w-64 z-50">
        <h3 class="font-bold mb-3 border-b border-slate-200 dark:border-slate-600 pb-2">Ajustes</h3>
        
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-2">Tema Visual:</label>
            <select id="selectTema" class="w-full bg-slate-100 dark:bg-slate-900 p-2 rounded border border-slate-300 dark:border-slate-700 cursor-pointer">
                <option value="system">Adaptable al Teléfono</option>
                <option value="light">Modo Claro</option>
                <option value="dark">Modo Oscuro</option>
            </select>
        </div>
        
        <div>
            <label class="block text-sm font-semibold mb-2">Idioma:</label>
            <!-- Aquí se inyecta el traductor de Google -->
            <div id="google_translate_element" class="w-full overflow-hidden rounded"></div>
        </div>
    </div>

    <!-- Barra de Búsqueda -->
    <div class="p-4 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
        <div class="relative max-w-md mx-auto">
            <input type="text" placeholder="Buscar equipos, ligas o torneos..." class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-full py-2 px-4 pl-10 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            <span class="absolute left-3 top-2.5 text-slate-400">🔍</span>
        </div>
    </div>

    <!-- Menú de Categorías (Horizontal Scroll) -->
    <nav class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-4 py-3">
        <div class="flex space-x-4 overflow-x-auto hide-scroll max-w-md mx-auto whitespace-nowrap">
            <button class="px-4 py-1 bg-blue-600 text-white rounded-full font-semibold text-sm">En Vivo</button>
            <button class="px-4 py-1 bg-slate-200 dark:bg-slate-700 rounded-full font-semibold text-sm hover:bg-slate-300 dark:hover:bg-slate-600 transition">Partidos Hoy</button>
            <button class="px-4 py-1 bg-slate-200 dark:bg-slate-700 rounded-full font-semibold text-sm hover:bg-slate-300 dark:hover:bg-slate-600 transition">Ligas</button>
            <button class="px-4 py-1 bg-slate-200 dark:bg-slate-700 rounded-full font-semibold text-sm hover:bg-slate-300 dark:hover:bg-slate-600 transition">Torneos</button>
            <button class="px-4 py-1 bg-slate-200 dark:bg-slate-700 rounded-full font-semibold text-sm hover:bg-slate-300 dark:hover:bg-slate-600 transition">Resultados</button>
            <button class="px-4 py-1 bg-slate-200 dark:bg-slate-700 rounded-full font-semibold text-sm hover:bg-slate-300 dark:hover:bg-slate-600 transition">Estadísticas</button>
            <button class="px-4 py-1 bg-slate-200 dark:bg-slate-700 rounded-full font-semibold text-sm hover:bg-slate-300 dark:hover:bg-slate-600 transition">Histórico</button>
        </div>
    </nav>

    <!-- Contenedor de Partidos -->
    <main id="app" class="p-4 space-y-4 max-w-md mx-auto mb-10">
        <div class="flex justify-center items-center py-10">
            <p class="text-center text-slate-500 animate-pulse">Cargando marcadores...</p>
        </div>
    </main>

    <!-- Scripts de Lógica -->
    <script>
        // 1. Manejo del Menú de Ajustes
        const menu = document.getElementById('menuAjustes');
        document.getElementById('btnAjustes').onclick = () => {
            menu.classList.toggle('hidden');
        };

        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', (event) => {
            if (!menu.contains(event.target) && event.target.id !== 'btnAjustes') {
                menu.classList.add('hidden');
            }
        });

        // 2. Lógica del Tema Visual
        document.getElementById('selectTema').onchange = (e) => {
            const val = e.target.value;
            if (val === 'dark') document.documentElement.classList.add('dark');
            else if (val === 'light') document.documentElement.classList.remove('dark');
            else {
                // Modo Sistema
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
        };

        // 3. Lógica de Consumo de API (Tu Proxy)
        async function renderizarPartidos() {
            const container = document.getElementById('app');
            try {
                const response = await fetch('https://proxy-partidos.vercel.app/api/partidos');
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    container.innerHTML = result.data.map(p => `
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border-l-4 border-l-blue-500 border-t border-r border-b border-slate-200 dark:border-slate-700 shadow-md flex justify-between items-center transition-all hover:shadow-lg cursor-pointer">
                            <span class="font-semibold w-4/12 text-left truncate text-sm">${p.local}</span>
                            <div class="w-3/12 flex flex-col items-center">
                                <span class="text-xs text-green-500 font-bold mb-1 animate-pulse">EN VIVO</span>
                                <span class="font-black text-xl bg-slate-100 dark:bg-slate-900 px-3 py-1 rounded">${p.marcador || '0-0'}</span>
                            </div>
                            <span class="font-semibold w-4/12 text-right truncate text-sm">${p.visitante}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="bg-white dark:bg-slate-800 p-6 rounded-xl text-center border border-slate-200 dark:border-slate-700">
                            <span class="text-3xl block mb-2">⚽</span>
                            <p class="text-slate-500 font-semibold">No hay partidos en vivo ahora.</p>
                        </div>`;
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="bg-red-50 dark:bg-red-900/20 p-4 rounded-xl border border-red-200 dark:border-red-800 text-center text-red-600 dark:text-red-400">
                        Error al conectar con los marcadores. Reintentando...
                    </div>`;
            }
        }

        // Iniciar y Auto-Refrescar
        renderizarPartidos();
        setInterval(renderizarPartidos, 60000);
    </script>
</body>
</html>
