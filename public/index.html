<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcadores En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <header class="p-5 border-b border-slate-700 bg-slate-800 sticky top-0 z-10">
        <h1 class="text-xl font-bold tracking-tight text-center">Marcadores En Vivo</h1>
    </header>

    <main id="app" class="p-4 space-y-4 max-w-md mx-auto">
        <p class="text-center text-slate-500 animate-pulse">Consultando resultados...</p>
    </main>

    <script>
        async function renderizarPartidos() {
            const container = document.getElementById('app');
            try {
                // Tu API ya está configurada, esto llamará a tu código en /api/partidos.js
                const response = await fetch('https://proxy-partidos.vercel.app/api/partidos');
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    container.innerHTML = result.data.map(p => `
                        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg flex justify-between items-center">
                            <span class="font-medium w-5/12 text-left">${p.local}</span>
                            <span class="font-bold text-blue-400 w-2/12 text-center">${p.marcador || '0-0'}</span>
                            <span class="font-medium w-5/12 text-right">${p.visitante}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-center text-slate-500">No hay partidos disponibles ahora.</p>';
                }
            } catch (err) {
                container.innerHTML = '<p class="text-center text-red-400">Error al cargar datos.</p>';
            }
        }

        renderizarPartidos();
        // Refrescar cada 60 segundos
        setInterval(renderizarPartidos, 60000);
    </script>
</body>
</html>
