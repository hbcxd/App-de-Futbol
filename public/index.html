<!DOCTYPE html>
<html lang="es" class="dark">
<header class="p-4 border-b border-slate-700 bg-slate-800 flex justify-between items-center sticky top-0 z-50">
    <h1 class="text-xl font-bold">Fútbol Pro</h1>
    
    <button id="btnAjustes" class="p-2 bg-slate-700 rounded-lg hover:bg-slate-600 transition">
        ⚙️ Ajustes
    </button>
</header>

<div id="menuAjustes" class="hidden absolute right-4 top-16 bg-slate-800 p-4 rounded-xl shadow-2xl border border-slate-600 w-48 z-50">
    <label class="block text-sm mb-2">Tema:</label>
    <select id="selectTema" class="w-full bg-slate-900 p-2 rounded mb-4">
        <option value="system">Sistema</option>
        <option value="light">Claro</option>
        <option value="dark">Oscuro</option>
    </select>
    
    <label class="block text-sm mb-2">Idioma:</label>
    <select id="selectIdioma" class="w-full bg-slate-900 p-2 rounded">
        <option value="es">Español</option>
        <option value="en">English</option>
        <option value="pt">Português</option>
    </select>
</div>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcadores En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <header class="p-5 border-b border-slate-700 bg-slate-800 sticky top-0 z-10">
        <h1 class="text-xl font-bold tracking-tight text-center">Marcadores En Vivo</h1>
    </header>

    <main id="app" class="p-4 space-y-4 max-w-md mx-auto">
        <p class="text-center text-slate-500 animate-pulse">Consultando resultados...</p>
    </main>

    <script>
        async function renderizarPartidos() {
            const container = document.getElementById('app');
            try {
                // Tu API ya está configurada, esto llamará a tu código en /api/partidos.js
                const response = await fetch('https://proxy-partidos.vercel.app/api/partidos');
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    container.innerHTML = result.data.map(p => `
                        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-lg flex justify-between items-center">
                            <span class="font-medium w-5/12 text-left">${p.local}</span>
                            <span class="font-bold text-blue-400 w-2/12 text-center">${p.marcador || '0-0'}</span>
                            <span class="font-medium w-5/12 text-right">${p.visitante}</span>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-center text-slate-500">No hay partidos disponibles ahora.</p>';
                }
            } catch (err) {
                container.innerHTML = '<p class="text-center text-red-400">Error al cargar datos.</p>';
            }
        }

        renderizarPartidos();
        // Refrescar cada 60 segundos
        setInterval(renderizarPartidos, 60000);
    </script>
<script>
    // Toggle del menú
    document.getElementById('btnAjustes').onclick = () => {
        document.getElementById('menuAjustes').classList.toggle('hidden');
    };

    // Lógica del Tema
    document.getElementById('selectTema').onchange = (e) => {
        const tema = e.target.value;
        if (tema === 'dark') document.documentElement.classList.add('dark');
        else if (tema === 'light') document.documentElement.classList.remove('dark');
        else {
            // Detectar sistema
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        }
    };
</script>
</body>
</html>
