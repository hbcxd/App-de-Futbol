<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <header class="p-5 border-b border-slate-700 bg-slate-800 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">Fútbol Pro</h1>
        <span class="text-xs text-slate-400">En Vivo</span>
    </header>

    <main id="app" class="p-4 space-y-4 max-w-md mx-auto">
        </main>

    <div class="mt-8 p-4 bg-slate-800 text-center text-slate-500 italic text-sm">
        Espacio publicitario
    </div>
<script>
    async function cargarPartidos() {
        const container = document.getElementById('app');
        container.innerHTML = '<p class="text-center text-slate-500">Cargando partidos...</p>';
        
        try {
            const response = await fetch('/api/partidos');
            const result = await response.json();
            
            if (result.data && result.data.length > 0) {
                container.innerHTML = result.data.map(partido => `
                    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center shadow-lg hover:border-blue-500 transition-all">
                        <div class="text-sm font-semibold w-1/3 text-left truncate">${partido.local || 'Local'}</div>
                        <div class="text-lg font-bold text-blue-400 w-1/3 text-center">${partido.marcador || '0-0'}</div>
                        <div class="text-sm font-semibold w-1/3 text-right truncate">${partido.visitante || 'Visitante'}</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="text-center text-slate-500">No hay partidos en vivo en este momento.</p>';
            }
        } catch (error) {
            container.innerHTML = '<p class="text-center text-red-500">Error conectando con el servidor.</p>';
        }
    }
    
    // Recargar automáticamente cada 60 segundos
    cargarPartidos();
    setInterval(cargarPartidos, 60000);
</script>
</body>
</html>
