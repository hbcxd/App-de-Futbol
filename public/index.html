<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-900 text-white font-sans">

    <header class="p-5 border-b border-slate-700 bg-slate-800 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">Fútbol Pro</h1>
        <span class="text-xs text-slate-400">En Vivo</span>
    </header>

    <main id="app" class="p-4 space-y-4 max-w-md mx-auto">
        </main>

    <div class="mt-8 p-4 bg-slate-800 text-center text-slate-500 italic text-sm">
        Espacio publicitario
    </div>
<script>
    async function cargarPartidos() {
        const response = await fetch('/api/partidos');
        const json = await response.json();
        const container = document.getElementById('app');

        container.innerHTML = json.data.map(partido => `
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex justify-between items-center shadow-lg">
                <div class="text-sm font-semibold">${partido.local}</div>
                <div class="text-lg font-bold text-blue-400">${partido.marcador}</div>
                <div class="text-sm font-semibold">${partido.visitante}</div>
            </div>
        `).join('');
    }
    cargarPartidos();
</script>
</body>
</html>
